<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CarSee — Reset password</title>
  <style>
    :root {
      --navy: #0d3b6e;
      --cyan: #00c4de;
      --bg: #f4f6fa;
      --card: #ffffff;
      --text: #0d1b2a;
      --muted: #546880;
      --error: #b91c1c;
      --ok: #166534;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #0d3b6e 0%, #1a5276 45%, #1a6090 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 20px;
      padding: 28px 24px 24px;
      box-shadow: 0 18px 48px rgba(9, 20, 37, 0.28);
    }
    .brand {
      text-align: center;
      margin-bottom: 20px;
    }
    .brand h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: var(--navy);
    }
    .brand h1 span { color: var(--cyan); }
    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--muted);
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #dde3ec;
      border-radius: 12px;
      font-size: 1rem;
      margin-bottom: 14px;
    }
    input:focus {
      outline: 2px solid rgba(0, 196, 222, 0.35);
      border-color: var(--cyan);
    }
    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--navy);
      color: #fff;
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.45;
      display: none;
    }
    .msg.error { display: block; background: #fee2e2; color: var(--error); }
    .msg.ok { display: block; background: #dcfce7; color: var(--ok); }
    .msg.info { display: block; background: #e0f7f9; color: var(--navy); }
    .hidden { display: none !important; }
    .lang {
      text-align: center;
      margin-bottom: 12px;
    }
    .lang button {
      width: auto;
      padding: 6px 14px;
      font-size: 0.85rem;
      background: #eef1f7;
      color: var(--navy);
      margin: 0 4px;
    }
    .lang button.active {
      background: var(--cyan);
      color: var(--navy);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="lang">
      <button type="button" id="btn-en" class="active">English</button>
      <button type="button" id="btn-ar">العربية</button>
    </div>
    <div class="brand">
      <h1>Car<span>See</span></h1>
      <p id="subtitle">Set a new password for your account</p>
    </div>

    <div id="loading" class="msg info">Verifying your reset link…</div>

    <form id="form" class="hidden" dir="ltr">
      <label for="password" id="label-password">New password</label>
      <input id="password" type="password" autocomplete="new-password" minlength="8" required />

      <label for="confirm" id="label-confirm">Confirm password</label>
      <input id="confirm" type="password" autocomplete="new-password" minlength="8" required />

      <button type="submit" id="submit">Save password</button>
    </form>

    <div id="done" class="hidden">
      <div class="msg ok" id="done-text">Password updated. You can close this page and sign in to CarSee.</div>
    </div>

    <div id="error" class="msg error hidden"></div>
  </div>

  <script src="./config.js"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/+esm';

    const cfg = window.CARSEE_AUTH;
    if (!cfg?.supabaseUrl || !cfg?.supabaseAnonKey) {
      showError('Auth configuration is missing.');
      throw new Error('Missing CARSEE_AUTH config');
    }

    const supabase = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
      auth: {
        // Browser-only reset uses verifyOtp(token_hash) — not PKCE code exchange.
        detectSessionInUri: false,
        persistSession: true,
        autoRefreshToken: false,
      },
    });

    async function hasSession() {
      const { data: { session } } = await supabase.auth.getSession();
      return session;
    }

    async function setSessionFromHash(hashParams) {
      const accessToken = hashParams.get('access_token');
      if (!accessToken) return false;
      const { error } = await supabase.auth.setSession({
        access_token: accessToken,
        refresh_token: hashParams.get('refresh_token') ?? '',
      });
      return !error;
    }

    async function tryVerifyRecoveryOtp({ token_hash, token }) {
      if (token_hash) {
        const { data, error } = await supabase.auth.verifyOtp({
          type: 'recovery',
          token_hash,
        });
        if (!error && data.session) return true;
      }
      if (token) {
        const viaHash = await supabase.auth.verifyOtp({
          type: 'recovery',
          token_hash: token,
        });
        if (!viaHash.error && viaHash.data.session) return true;
        const viaToken = await supabase.auth.verifyOtp({
          type: 'recovery',
          token,
        });
        if (!viaToken.error && viaToken.data.session) return true;
      }
      return false;
    }

    const strings = {
      en: {
        subtitle: 'Set a new password for your account',
        loading: 'Verifying your reset link…',
        password: 'New password',
        confirm: 'Confirm password',
        submit: 'Save password',
        mismatch: 'Passwords do not match.',
        short: 'Password must be at least 8 characters.',
        done: 'Password updated. You can close this page and sign in to CarSee.',
        invalid: 'This reset link is invalid or has expired. Request a new one from the CarSee app.',
        failed: 'Could not update password. Try again or request a new reset email.',
      },
      ar: {
        subtitle: 'اختر كلمة مرور جديدة لحسابك',
        loading: 'جاري التحقق من رابط إعادة التعيين…',
        password: 'كلمة المرور الجديدة',
        confirm: 'تأكيد كلمة المرور',
        submit: 'حفظ كلمة المرور',
        mismatch: 'كلمتا المرور غير متطابقتين.',
        short: 'يجب أن تكون كلمة المرور 8 أحرف على الأقل.',
        done: 'تم تحديث كلمة المرور. يمكنك إغلاق هذه الصفحة وتسجيل الدخول إلى CarSee.',
        invalid: 'رابط إعادة التعيين غير صالح أو منتهٍ. اطلب رابطاً جديداً من تطبيق CarSee.',
        failed: 'تعذّر تحديث كلمة المرور. حاول مرة أخرى أو اطلب بريداً جديداً.',
      },
    };

    let lang = navigator.language?.startsWith('ar') ? 'ar' : 'en';

    function t(key) {
      return strings[lang][key] || strings.en[key];
    }

    function applyLang() {
      document.documentElement.lang = lang;
      document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.getElementById('subtitle').textContent = t('subtitle');
      document.getElementById('label-password').textContent = t('password');
      document.getElementById('label-confirm').textContent = t('confirm');
      document.getElementById('submit').textContent = t('submit');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
    }

    document.getElementById('btn-en').onclick = () => { lang = 'en'; applyLang(); };
    document.getElementById('btn-ar').onclick = () => { lang = 'ar'; applyLang(); };
    applyLang();

    function showError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('form').classList.add('hidden');
      const el = document.getElementById('error');
      el.textContent = message;
      el.classList.remove('hidden');
    }

    function showForm() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('form').classList.remove('hidden');
    }

    function showDone() {
      document.getElementById('form').classList.add('hidden');
      document.getElementById('done-text').textContent = t('done');
      document.getElementById('done').classList.remove('hidden');
      cleanUrl();
    }

    function cleanUrl() {
      const path = window.location.pathname.endsWith('/')
        ? window.location.pathname
        : window.location.pathname + '/';
      window.history.replaceState({}, '', path);
    }

    async function ensureRecoverySession() {
      document.getElementById('loading').textContent = t('loading');

      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const queryParams = new URLSearchParams(window.location.search);
      const tokenHash = queryParams.get('token_hash') || hashParams.get('token_hash');
      const rawToken = queryParams.get('token') || hashParams.get('token');
      const authCode = queryParams.get('code');

      if (await hasSession()) {
        showForm();
        return;
      }

      // Primary path: custom Supabase email template links token_hash directly here.
      if (tokenHash) {
        const ok = await tryVerifyRecoveryOtp({ token_hash: tokenHash, token: null });
        if (ok && await hasSession()) {
          showForm();
          return;
        }
      }

      if (rawToken) {
        const ok = await tryVerifyRecoveryOtp({ token_hash: null, token: rawToken });
        if (ok && await hasSession()) {
          showForm();
          return;
        }
      }

      if (hashParams.get('access_token')) {
        if (await setSessionFromHash(hashParams) && await hasSession()) {
          showForm();
          return;
        }
      }

      // Legacy Supabase redirect with PKCE code (usually fails in browser — needs app verifier).
      if (authCode) {
        try {
          const { error } = await supabase.auth.exchangeCodeForSession(authCode);
          if (!error && await hasSession()) {
            showForm();
            return;
          }
        } catch (_) {}
      }

      await new Promise((resolve) => setTimeout(resolve, 600));
      if (await hasSession()) {
        showForm();
        return;
      }

      showError(t('invalid'));
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('submit');

      if (password.length < 8) {
        showError(t('short'));
        return;
      }
      if (password !== confirm) {
        showError(t('mismatch'));
        return;
      }

      btn.disabled = true;
      document.getElementById('error').classList.add('hidden');

      const { error } = await supabase.auth.updateUser({ password });
      btn.disabled = false;

      if (error) {
        showError(t('failed'));
        return;
      }

      await supabase.auth.signOut();
      showDone();
    });

    supabase.auth.onAuthStateChange((event, session) => {
      if ((event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') && session) {
        showForm();
      }
    });

    ensureRecoverySession();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CarSee — Welcome</title>
  <style>
    :root {
      --navy: #0d3b6e;
      --cyan: #00c4de;
      --card: #ffffff;
      --text: #0d1b2a;
      --muted: #546880;
      --ok: #166534;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #0d3b6e 0%, #1a5276 45%, #1a6090 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 20px;
      padding: 28px 24px 24px;
      box-shadow: 0 18px 48px rgba(9, 20, 37, 0.28);
      text-align: center;
    }
    .brand h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--navy);
    }
    .brand h1 span { color: var(--cyan); }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: #e0f7f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 1.35rem;
      color: var(--navy);
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.5;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--navy);
      color: #fff;
      margin-top: 8px;
    }
    .lang { margin-bottom: 14px; }
    .lang button {
      width: auto;
      padding: 6px 14px;
      font-size: 0.85rem;
      background: #eef1f7;
      color: var(--navy);
      margin: 0 4px;
    }
    .lang button.active { background: var(--cyan); color: var(--navy); }
    .note {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #dcfce7;
      color: var(--ok);
      font-size: 0.9rem;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="lang">
      <button type="button" id="btn-en" class="active">English</button>
      <button type="button" id="btn-ar">العربية</button>
    </div>
    <div class="brand">
      <h1>Car<span>See</span></h1>
    </div>
    <div class="icon" aria-hidden="true">✓</div>
    <h2 id="title">Welcome to CarSee!</h2>
    <p id="body">Your account is ready. Open the CarSee app and sign in with the email and password you just created.</p>
    <button type="button" id="open-app">Open CarSee &amp; log in</button>
    <p id="hint">If the app does not open, launch CarSee from your home screen and tap Log in.</p>
    <div class="note" id="note">You can close this browser tab after opening the app.</div>
  </div>

  <script>
    const APP_SCHEME = 'com.carsee.damage_detector';
    const APP_HOST = 'login-callback';
    const ANDROID_PACKAGE = 'com.carsee.damage_detector';

    const strings = {
      en: {
        title: 'Welcome to CarSee!',
        body: 'Your account is ready. Open the CarSee app and sign in with the email and password you just created.',
        openApp: 'Open CarSee & log in',
        hint: 'If the app does not open, launch CarSee from your home screen and tap Log in.',
        note: 'You can close this browser tab after opening the app.',
      },
      ar: {
        title: 'مرحباً بك في CarSee!',
        body: 'حسابك جاهز. افتح تطبيق CarSee وسجّل الدخول بالبريد وكلمة المرور اللذين أنشأتهما للتو.',
        openApp: 'فتح CarSee وتسجيل الدخول',
        hint: 'إذا لم يُفتح التطبيق، شغّل CarSee من الشاشة الرئيسية واضغط تسجيل الدخول.',
        note: 'يمكنك إغلاق هذه الصفحة بعد فتح التطبيق.',
      },
    };

    let lang = navigator.language?.startsWith('ar') ? 'ar' : 'en';

    function t(key) {
      return strings[lang][key] || strings.en[key];
    }

    function applyLang() {
      document.documentElement.lang = lang;
      document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.getElementById('title').textContent = t('title');
      document.getElementById('body').textContent = t('body');
      document.getElementById('open-app').textContent = t('openApp');
      document.getElementById('hint').textContent = t('hint');
      document.getElementById('note').textContent = t('note');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
    }

    document.getElementById('btn-en').onclick = () => { lang = 'en'; applyLang(); };
    document.getElementById('btn-ar').onclick = () => { lang = 'ar'; applyLang(); };
    applyLang();

    function buildAppDeepLink() {
      const params = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      if (!params.get('type') && !hashParams.get('type')) {
        params.set('type', 'signup');
      }
      const query = params.toString();
      const hash = window.location.hash || '';
      return `${APP_SCHEME}://${APP_HOST}${query ? `?${query}` : ''}${hash}`;
    }

    function buildAndroidIntentUrl() {
      const params = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      if (!params.get('type') && !hashParams.get('type')) {
        params.set('type', 'signup');
      }
      const query = params.toString();
      return `intent://${APP_HOST}${query ? `?${query}` : ''}#Intent;scheme=${APP_SCHEME};package=${ANDROID_PACKAGE};end`;
    }

    function openApp() {
      const appUrl = buildAppDeepLink();
      const intentUrl = buildAndroidIntentUrl();
      window.location.href = appUrl;
      setTimeout(() => { window.location.href = intentUrl; }, 700);
    }

    document.getElementById('open-app').onclick = openApp;

    // If Supabase sent auth params here, forward them into the app once.
    (function maybeAutoOpen() {
      const params = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const hasAuth =
        params.get('code') ||
        params.get('token_hash') ||
        params.get('token') ||
        hashParams.get('access_token') ||
        hashParams.get('type');
      if (hasAuth) {
        setTimeout(openApp, 400);
      }
    })();
  </script>
</body>
</html>

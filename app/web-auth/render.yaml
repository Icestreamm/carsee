# Render Static Site — browser password reset for CarSee
# Dashboard: New → Static Site → connect repo → Root Directory: app/web-auth
services:
  - type: web
    name: carsee-auth
    runtime: static
    staticPublishPath: .
    buildCommand: echo "Static auth pages — no build"
    routes:
      - type: rewrite
        source: /*
        destination: /reset-password.html
